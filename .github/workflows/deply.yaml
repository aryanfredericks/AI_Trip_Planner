name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:${{ github.sha }}

      # - name: Deploy to EC2
      #   env:
      #     SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      #   run: |
      #     echo "$SSH_KEY" > /tmp/ec2_key.pem
      #     chmod 400 /tmp/ec2_key.pem

      #     ssh -i /tmp/ec2_key.pem \
      #       -o StrictHostKeyChecking=no \
      #       ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
      #         docker pull ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
      #         docker stop travel-planner || true
      #         docker rm travel-planner || true
      #         docker run -d \
      #           --name travel-planner \
      #           --restart always \
      #           -p 8000:8000 \
      #           --env-file /home/ubuntu/.env \
      #           ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
      #     ENDSSH

      #     rm /tmp/ec2_key.pem
      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -i /tmp/ec2_key.pem \
              ubuntu@${{ secrets.EC2_HOST }} "
                set -e

                docker pull ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest

                docker stop travel-planner || true
                docker rm travel-planner || true

                docker run -d \
                  --name travel-planner \
                  --restart always \
                  -p 8000:8000 \
                  --env-file /home/ubuntu/.env \
                  ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
              "

          rm -f /tmp/ec2_key.pem