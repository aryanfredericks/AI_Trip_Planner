name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest
            docker stop travel-planner || true
            docker rm travel-planner || true
            docker run -d \
              --name travel-planner \
              --restart always \
              -p 8000:8000 \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKER_USERNAME }}/ai-trip-planner:latest